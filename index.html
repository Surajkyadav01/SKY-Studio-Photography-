 <head>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&amp;family=DM+Sans:wght@300;400;500;600&amp;display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    
    .font-display { font-family: 'Playfair Display', Georgia, serif; }
    .font-body { font-family: 'DM Sans', system-ui, sans-serif; }
    
    /* Animated gradient background */
    .gradient-bg {
      background: linear-gradient(135deg, #0f0f0f 0%, #1a1a2e 50%, #16213e 100%);
      position: relative;
      overflow: hidden;
      transition: background 0.5s ease;
    }
    
    .gradient-bg::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(212, 175, 55, 0.03) 0%, transparent 50%);
      animation: pulse 8s ease-in-out infinite;
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1) rotate(0deg); opacity: 0.5; }
      50% { transform: scale(1.1) rotate(180deg); opacity: 1; }
    }
    
    /* Glass morphism card */
    .glass-card {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      transition: all 0.3s ease;
    }
    
    /* Custom range slider */
    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      background: transparent;
      cursor: pointer;
    }
    
    input[type="range"]::-webkit-slider-track {
      height: 4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
    }
    
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 20px;
      height: 20px;
      background: linear-gradient(135deg, #d4af37, #f4d03f);
      border-radius: 50%;
      margin-top: -8px;
      box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4);
      transition: transform 0.2s ease;
    }
    
    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.15);
    }
    
    input[type="range"]::-moz-range-track {
      height: 4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
    }
    
    input[type="range"]::-moz-range-thumb {
      width: 20px;
      height: 20px;
      background: linear-gradient(135deg, #d4af37, #f4d03f);
      border-radius: 50%;
      border: none;
      box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4);
    }
    
    /* Number input styling */
    input[type="number"] {
      -moz-appearance: textfield;
    }
    
    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    
    /* Checkbox styling */
    .checkbox-custom {
      position: relative;
      width: 24px;
      height: 24px;
      cursor: pointer;
    }
    
    .checkbox-custom input {
      opacity: 0;
      width: 100%;
      height: 100%;
      position: absolute;
      cursor: pointer;
    }
    
    .checkbox-custom .checkmark {
      position: absolute;
      top: 0;
      left: 0;
      width: 24px;
      height: 24px;
      background: rgba(255, 255, 255, 0.05);
      border: 2px solid rgba(255, 255, 255, 0.2);
      border-radius: 6px;
      transition: all 0.3s ease;
    }
    
    .checkbox-custom input:checked ~ .checkmark {
      background: linear-gradient(135deg, #d4af37, #f4d03f);
      border-color: #d4af37;
    }
    
    .checkbox-custom .checkmark::after {
      content: '';
      position: absolute;
      display: none;
      left: 7px;
      top: 3px;
      width: 6px;
      height: 12px;
      border: solid #0f0f0f;
      border-width: 0 2px 2px 0;
      transform: rotate(45deg);
    }
    
    .checkbox-custom input:checked ~ .checkmark::after {
      display: block;
    }
    
    /* Animated total */
    .total-display {
      background: linear-gradient(135deg, rgba(212, 175, 55, 0.1), rgba(244, 208, 63, 0.05));
      border: 1px solid rgba(212, 175, 55, 0.3);
    }
    
    /* Stagger animation */
    .stagger-item {
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 0.6s ease forwards;
    }
    
    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }
    
    .stagger-item:nth-child(1) { animation-delay: 0.1s; }
    .stagger-item:nth-child(2) { animation-delay: 0.2s; }
    .stagger-item:nth-child(3) { animation-delay: 0.3s; }
    .stagger-item:nth-child(4) { animation-delay: 0.4s; }
    
    /* Decorative elements */
    .corner-accent {
      position: absolute;
      width: 80px;
      height: 80px;
      border: 1px solid rgba(212, 175, 55, 0.2);
    }
    
    .corner-accent.top-left {
      top: -1px;
      left: -1px;
      border-right: none;
      border-bottom: none;
    }
    
    .corner-accent.bottom-right {
      bottom: -1px;
      right: -1px;
      border-left: none;
      border-top: none;
    }
    
    /* Theme toggle */
    .theme-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 50;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 50px;
      padding: 12px 16px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .theme-toggle:hover {
      background: rgba(255, 255, 255, 0.15);
      transform: scale(1.05);
    }
    
    /* Light theme */
    body.light-theme {
      background: linear-gradient(135deg, #ffffff 0%, #f5f5f5 50%, #e8e8e8 100%) !important;
      color: #1a1a1a;
    }
    
    body.light-theme .gradient-bg {
      background: linear-gradient(135deg, #ffffff 0%, #f5f5f5 50%, #e8e8e8 100%);
    }
    
    body.light-theme .glass-card {
      background: rgba(255, 255, 255, 0.4);
      border: 1px solid rgba(0, 0, 0, 0.08);
    }
    
    body.light-theme .font-display,
    body.light-theme .font-body {
      color: #1a1a1a;
    }
    
    body.light-theme h1,
    body.light-theme h2,
    body.light-theme h3,
    body.light-theme p,
    body.light-theme a {
      color: inherit;
    }
    
    body.light-theme .text-white {
      color: #1a1a1a;
    }
    
    body.light-theme .text-white\/50 {
      color: rgba(26, 26, 26, 0.5);
    }
    
    body.light-theme .text-white\/40 {
      color: rgba(26, 26, 26, 0.4);
    }
    
    body.light-theme .text-white\/70 {
      color: rgba(26, 26, 26, 0.7);
    }
    
    body.light-theme .text-white\/90 {
      color: rgba(26, 26, 26, 0.9);
    }
    
    body.light-theme .text-white\/30 {
      color: rgba(26, 26, 26, 0.3);
    }
    
    body.light-theme .text-white\/60 {
      color: rgba(26, 26, 26, 0.6);
    }
    
    body.light-theme .bg-white\/\[0\.02\] {
      background: rgba(0, 0, 0, 0.02);
    }
    
    body.light-theme .bg-white\/5 {
      background: rgba(0, 0, 0, 0.05);
    }
    
    body.light-theme .bg-white\/10 {
      background: rgba(0, 0, 0, 0.1);
    }
    
    body.light-theme .bg-white\/20 {
      background: rgba(0, 0, 0, 0.2);
    }
    
    body.light-theme .border-white\/10 {
      border-color: rgba(0, 0, 0, 0.1);
    }
    
    body.light-theme .border-white\/20 {
      border-color: rgba(0, 0, 0, 0.2);
    }
    
    body.light-theme .border-white\/8 {
      border-color: rgba(0, 0, 0, 0.08);
    }
    
    body.light-theme input[type="range"]::-webkit-slider-track {
      background: rgba(0, 0, 0, 0.1);
    }
    
    body.light-theme input[type="range"]::-moz-range-track {
      background: rgba(0, 0, 0, 0.1);
    }
    
    body.light-theme .theme-toggle {
      background: rgba(0, 0, 0, 0.1);
      border-color: rgba(0, 0, 0, 0.15);
      color: #1a1a1a;
    }
    
    body.light-theme .theme-toggle:hover {
      background: rgba(0, 0, 0, 0.15);
    }
    
    body.light-theme .total-display {
      background: linear-gradient(135deg, rgba(212, 175, 55, 0.08), rgba(244, 208, 63, 0.03));
      border: 1px solid rgba(212, 175, 55, 0.2);
    }

    body.light-theme .checkbox-custom .checkmark::after {
      border-color: #1a1a1a;
    }
  </style>
  <style>body { box-sizing: border-box; }</style>
